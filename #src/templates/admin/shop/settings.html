{% extends 'admin_base.html' %}



{% block body %}
<div class="page__title">Настройки магазина</div>

<div class="breadcrumb">
    <div class="breadcrumb__inner">

        <ol class="breadcrumb__list">
            <li class="breadcrumb__item"><a class="breadcrumb__link" href="{% url 'admin' %}">Главная</a></li>

            <li class="breadcrumb__item">Настройки магазина</li>
           
        </ol>


        
    </div>
</div>

<div class="page">
   

        <form action="" class="form" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            {{ form.media }}
            <button class="btn btn--primary">Сохранить</button>

        </form>
        <form action="{% url 'zone_file' %}" class="form" method="post" enctype="multipart/form-data">
            Файл с зонами доставки (подготовлен черех конструктор Яндекс карт)

            <input type="file" name="file">
            {% csrf_token %}
            
            <button class="btn btn--primary">Сохранить</button>

        </form>

    
</div>



{% endblock %}

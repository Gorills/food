

{% if setup.meta_h1 or setup.text %}
<div class="about">
    <div class="container">
        <div class="about__inner">
            {% if setup.meta_h1 %}
            <h1 class="title">{{ setup.meta_h1 }}</h1>
            {% endif %}
            {% if setup.text %}

            {{ setup.text | safe }}
            {% endif %}

        </div>
    </div>
</div>
{% endif %}
